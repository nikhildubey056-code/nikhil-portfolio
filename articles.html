<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles — Nikhil Dubey</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script>
const API_BASE = 'https://nikhil-backend-d73f.onrender.com/api';

async function apiCall(endpoint, method = 'GET', body = null) {
  try {
    const options = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) options.body = JSON.stringify(body);
    const res = await fetch(`${API_BASE}${endpoint}`, options);
    const data = await res.json();
    if (!data.success && res.status >= 400) throw new Error(data.error || 'API error');
    return data;
  } catch (err) {
    console.error(`API Error:`, err.message);
    throw err;
  }
}

const ArticlesAPI = {
  getAll: (params = {}) => {
    const query = new URLSearchParams(params).toString();
    return apiCall(`/articles${query ? '?' + query : ''}`);
  },
  getOne: (id) => apiCall(`/articles/${id}`),
  create: (data) => apiCall('/articles', 'POST', data),
  update: (id, data) => apiCall(`/articles/${id}`, 'PUT', data),
  delete: (id) => apiCall(`/articles/${id}`, 'DELETE'),
  setStatus: (id, status) => apiCall(`/articles/${id}/status`, 'PUT', { status })
};

const ProfileAPI = {
  get: () => apiCall('/profile'),
  update: (data) => apiCall('/profile', 'PUT', data),
  uploadPhoto: (base64) => apiCall('/profile/photo', 'PUT', { photo: base64 }),
  deletePhoto: () => apiCall('/profile/photo', 'DELETE')
};
</script>
<style>
:root{--bg:#1a1410;--surface:#231c16;--gold:#c9a84c;--gold-l:#e8d5a3;--cream:#faf7f2;--muted:#6b5c4e;--border:rgba(201,168,76,0.25);--rust:#8b3a2a;--success:#4a6741;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--cream);font-family:'Cormorant Garamond',serif;min-height:100vh;cursor:none;}
#cur{position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cring{position:fixed;width:32px;height:32px;border:1px solid rgba(201,168,76,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left 0.12s,top 0.12s;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1rem 4rem;background:rgba(26,20,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}

.nav-links a{font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.3s;}

.nav-cta{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.5rem 1.2rem;background:var(--gold);color:var(--bg);text-decoration:none;transition:all 0.3s;}
.nav-cta:hover{background:var(--gold-l);}
.page-header{padding:7rem 6rem 3rem;background:var(--bg);position:relative;overflow:hidden;border-bottom:1px solid var(--border);}
.page-header::before{content:'Articles';position:absolute;right:-2rem;top:50%;transform:translateY(-50%);font-family:'Playfair Display',serif;font-size:15rem;font-weight:900;font-style:italic;color:rgba(201,168,76,0.03);line-height:1;pointer-events:none;white-space:nowrap;}
.page-label{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;display:flex;align-items:center;gap:0.8rem;}

.field input,.field select,.field textarea{width:100%;padding:0.9rem 1rem;background:rgba(250,247,242,0.05);border:1px solid var(--border);color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:1.05rem;outline:none;transition:border-color 0.3s;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);background:rgba(250,247,242,0.08);}

.btn{font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;padding:1rem 1.8rem;cursor:pointer;transition:all 0.3s;border:none;}

.list-panel{padding:3rem 2.5rem;background:rgba(201,168,76,0.02);overflow-y:auto;max-height:calc(100vh - 160px);position:sticky;top:160px;}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.list-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--cream);}
.list-count{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--gold);background:rgba(201,168,76,0.1);padding:0.3rem 0.7rem;}
.filter-bar{display:flex;gap:0.5rem;margin-bottom:1.5rem;}
.filter-btn{font-family:'JetBrains Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.35rem 0.8rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.filter-btn.active,.filter-btn:hover{background:var(--gold);color:var(--bg);border-color:var(--gold);}
.article-item{background:rgba(250,247,242,0.03);border:1px solid var(--border);padding:1.5rem;margin-bottom:1rem;transition:all 0.3s;}
.article-item:hover{border-color:rgba(201,168,76,0.5);transform:translateX(4px);}
.article-item-tag{font-family:'JetBrains Mono',monospace;font-size:0.55rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem;}

.article-item-footer{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding-top:0.8rem;border-top:1px solid rgba(201,168,76,0.1);}
.article-item-date{font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:var(--muted);}
.article-item-actions{display:flex;gap:0.5rem;}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:0.55rem;padding:0.25rem 0.6rem;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all 0.2s;color:var(--muted);}
.action-btn.edit:hover{border-color:var(--gold);color:var(--gold);}
.action-btn.delete:hover{border-color:var(--rust);color:var(--rust);}
.status-badge{font-family:'JetBrains Mono',monospace;font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.2rem 0.5rem;}
.status-badge.published{background:rgba(74,103,65,0.15);color:#4caf82;border:1px solid rgba(74,103,65,0.3);}
.status-badge.draft{background:rgba(107,92,78,0.1);color:var(--muted);border:1px solid var(--border);}
.empty-state{text-align:center;padding:3rem 1rem;}
.empty-state span{font-size:3rem;display:block;margin-bottom:1rem;opacity:0.3;}
.empty-state p{font-style:italic;color:var(--muted);font-size:0.95rem;}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;gap:0.6rem;}
.loading-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:lp 1.2s infinite;}
.loading-dot:nth-child(2){animation-delay:0.2s;}
.loading-dot:nth-child(3){animation-delay:0.4s;}
@keyframes lp{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(10px);padding:2rem;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg);border:1px solid var(--border);max-width:700px;width:100%;max-height:85vh;overflow-y:auto;position:relative;}
.modal-header{background:rgba(201,168,76,0.06);padding:3rem;border-bottom:1px solid var(--border);}
.modal-close{position:absolute;top:1.5rem;right:2rem;font-size:1.3rem;cursor:pointer;color:var(--muted);background:none;border:none;transition:color 0.2s;}
.modal-close:hover{color:var(--cream);}
.modal-tag{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:1rem;}
.modal-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--cream);line-height:1.2;margin-bottom:0.8rem;}
.modal-date{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:0.15em;}
.modal-body{padding:3rem;}
.modal-content{font-size:1.1rem;line-height:2;color:rgba(250,247,242,0.8);white-space:pre-wrap;}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--bg);color:var(--cream);padding:1rem 2rem;font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;z-index:9995;transform:translateY(80px);opacity:0;transition:all 0.4s;border:1px solid var(--border);border-left:3px solid var(--gold);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-left-color:#4caf82;}
.toast.error{border-left-color:var(--rust);}
@media(max-width:900px){nav{padding:1rem 1.5rem;}.nav-links{display:none;}.main{grid-template-columns:1fr;}.list-panel{position:static;max-height:none;}.page-header{padding:5rem 2rem 2rem;}.editor-panel{padding:2rem;}}
</style>
<script>
const API_BASE = 'https://nikhil-backend-d73f.onrender.com/api';
async function apiCall(endpoint,method='GET',body=null){try{const options={method,headers:{'Content-Type':'application/json'}};if(body)options.body=JSON.stringify(body);const res=await fetch(`${API_BASE}${endpoint}`,options);const data=await res.json();if(!data.success&&res.status>=400)throw new Error(data.error||'API error');return data;}catch(err){throw err;}}
const ArticlesAPI={getAll:(p={})=>{const q=new URLSearchParams(p).toString();return apiCall(`/articles${q?'?'+q:''}`);},getOne:(id)=>apiCall(`/articles/${id}`),create:(d)=>apiCall('/articles','POST',d),update:(id,d)=>apiCall(`/articles/${id}`,'PUT',d),delete:(id)=>apiCall(`/articles/${id}`,'DELETE')};
const ProfileAPI={get:()=>apiCall('/profile'),update:(d)=>apiCall('/profile','PUT',d),uploadPhoto:(b)=>apiCall('/profile/photo','PUT',{photo:b}),deletePhoto:()=>apiCall('/profile/photo','DELETE')};
</script>
</head>
<body>
<div id="cur"></div><div id="cring"></div>
<nav>
  <a href="index.html" class="nav-logo">N<span>.</span>Dubey</a>
  <ul class="nav-links">
    <li><a href="index.html">← Home</a></li>
    <li><a href="#" style="color:var(--gold);">Articles</a></li>
    <li><a href="index.html#contact">Contact</a></li>
    <li><a href="index.html" class="nav-cta">View Profile</a></li>
  </ul>
</nav>
 
<div class="page-header">
  <div class="page-label">Your Writing Space</div>
  <h1 class="page-title">Articles &<br><em>Reflections</em></h1>
</div>
 
<div class="main">
  <div class="editor-panel">
    <div class="panel-label" id="editorLabel">✦ Write New Article</div>
    <input type="hidden" id="editingId">
 
    <div class="photo-section">
      <label class="photo-label">Cover Photo (Optional)</label>
      <div class="photo-upload-zone">
        <input type="file" accept="image/*" id="coverInput" onchange="handleCover(event)">
        <div class="photo-upload-content" id="coverContent">
          <span>🖼️</span>
          <p>Upload a cover image</p>
          <small>JPG · PNG · WEBP</small>
        </div>
        <img id="coverPreview" src="" alt="Cover">
      </div>
    </div>
 
    <div class="field">
      <label class="field-label">Article Title *</label>
      <input type="text" id="titleInput" placeholder="e.g. Why Sociology is the Heart of UPSC…" maxlength="120">
      <div class="char-count"><span id="titleCount">0</span>/120</div>
    </div>
 
    <div class="field">
      <label class="field-label">Category</label>
      <select id="categoryInput">
        <option>UPSC & Civil Services</option>
        <option>Sociology</option>
        <option>Technology & ML</option>
        <option>Book Review</option>
        <option>Personal Reflection</option>
        <option>Governance & Policy</option>
        <option>Menace to Monk</option>
        <option>General Studies</option>
      </select>
    </div>
 
    <div class="field">
      <label class="field-label">Article Content *</label>
      <textarea id="contentInput" placeholder="Start writing your thoughts here..."></textarea>
      <div class="char-count"><span id="wordCount">0</span> words</div>
    </div>
 
    <div class="editor-actions">
      <button class="btn btn-publish" id="publishBtn" onclick="publishArticle()">✦ Publish Article</button>
      <button class="btn btn-draft" id="draftBtn" onclick="saveDraft()">Save Draft</button>
      <button class="btn btn-clear" onclick="clearEditor()">Clear</button>
    </div>
  </div>
 
  <div class="list-panel">
    <div class="list-header">
      <div class="list-title">Your Articles</div>
      <div class="list-count" id="articleCount">Loading...</div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterArticles('all',this)">All</button>
      <button class="filter-btn" onclick="filterArticles('published',this)">Published</button>
      <button class="filter-btn" onclick="filterArticles('draft',this)">Drafts</button>
    </div>
    <div id="articlesList">
      <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    </div>
  </div>
</div>
 
<div class="modal-bg" id="readModal">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-tag" id="modalTag"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-date" id="modalDate"></div>
    </div>
    <div class="modal-body">
      <img id="modalCover" src="" alt="" style="display:none;width:100%;max-height:200px;object-fit:cover;margin-bottom:2rem;">
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
const cur=document.getElementById('cur'),cring=document.getElementById('cring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
function animR(){rx+=(mx-rx)*0.15;ry+=(my-ry)*0.15;cring.style.left=rx+'px';cring.style.top=ry+'px';requestAnimationFrame(animR);}animR();
 
let currentFilter='all';
let allArticles=[];
 
function handleCover(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    document.getElementById('coverPreview').src=ev.target.result;
    document.getElementById('coverPreview').style.display='block';
    document.getElementById('coverContent').style.display='none';
  };
  reader.readAsDataURL(file);
}
 
document.getElementById('titleInput').addEventListener('input',function(){document.getElementById('titleCount').textContent=this.value.length;});
document.getElementById('contentInput').addEventListener('input',function(){
  const w=this.value.trim()?this.value.trim().split(/\s+/).length:0;
  document.getElementById('wordCount').textContent=w;
});
 
async function publishArticle(){
  const title=document.getElementById('titleInput').value.trim();
  const content=document.getElementById('contentInput').value.trim();
  if(!title){showToast('Please add a title','error');return;}
  if(!content){showToast('Please write some content','error');return;}
  await saveArticle('published');
}
 
async function saveDraft(){
  if(!document.getElementById('titleInput').value.trim()){showToast('Add a title first','error');return;}
  await saveArticle('draft');
}
 
async function saveArticle(status){
  const pb=document.getElementById('publishBtn'),db=document.getElementById('draftBtn');
  pb.disabled=true;db.disabled=true;pb.textContent='Saving...';
  const cover=document.getElementById('coverPreview').src;
  const editingId=document.getElementById('editingId').value;
  const data={
    title:document.getElementById('titleInput').value.trim(),
    content:document.getElementById('contentInput').value.trim(),
    category:document.getElementById('categoryInput').value,
    status,
    coverImage:cover&&cover!==window.location.href?cover:null
  };
  try{
    if(editingId){
      await ArticlesAPI.update(editingId,data);
      showToast(status==='published'?'Article updated!':'Draft updated!','success');
    }else{
      await ArticlesAPI.create(data);
      showToast(status==='published'?'✦ Article published to MongoDB!':'Draft saved!','success');
    }
    clearEditor();
    await loadArticles();
  }catch(err){
    showToast('Error: '+err.message,'error');
  }finally{
    pb.disabled=false;db.disabled=false;pb.textContent='✦ Publish Article';
  }
}
 
function clearEditor(){
  document.getElementById('titleInput').value='';
  document.getElementById('contentInput').value='';
  document.getElementById('categoryInput').selectedIndex=0;
  document.getElementById('coverPreview').style.display='none';
  document.getElementById('coverContent').style.display='flex';
  document.getElementById('editingId').value='';
  document.getElementById('editorLabel').textContent='✦ Write New Article';
  document.getElementById('titleCount').textContent='0';
  document.getElementById('wordCount').textContent='0';
  document.getElementById('coverInput').value='';
}
 
async function loadArticles(){
  document.getElementById('articlesList').innerHTML='<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
  try{
    const params=currentFilter==='all'?{}:{status:currentFilter};
    const res=await ArticlesAPI.getAll(params);
    allArticles=res.articles||[];
    document.getElementById('articleCount').textContent=`${res.total||0} Article${res.total!==1?'s':''}`;
    renderArticles(allArticles);
  }catch(err){
    document.getElementById('articlesList').innerHTML=`<div class="empty-state"><span>⚠️</span><p>Could not load.<br>${err.message}</p></div>`;
  }
}
 
function renderArticles(articles){
  const list=document.getElementById('articlesList');
  if(!articles.length){list.innerHTML='<div class="empty-state"><span>✍️</span><p>No articles yet.<br>Write your first one!</p></div>';return;}
  list.innerHTML=articles.map(a=>`
    <div class="article-item">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.4rem;">
        <div class="article-item-tag">${a.category}</div>
        <span class="status-badge ${a.status}">${a.status}</span>
      </div>
      <div class="article-item-title">${a.title}</div>
      <div class="article-item-excerpt">${a.content}</div>
      <div class="article-item-footer">
        <span class="article-item-date">${new Date(a.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>
        <div class="article-item-actions">
          <button class="action-btn" onclick="readArticle('${a._id}')">Read</button>
          <button class="action-btn edit" onclick="editArticle('${a._id}')">Edit</button>
          <button class="action-btn delete" onclick="deleteArticle('${a._id}')">Del</button>
        </div>
      </div>
    </div>
  `).join('');
}
 
function filterArticles(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadArticles();
}
 
function readArticle(id){
  const a=allArticles.find(x=>x._id===id);if(!a)return;
  document.getElementById('modalTag').textContent=a.category;
  document.getElementById('modalTitle').textContent=a.title;
  document.getElementById('modalDate').textContent=new Date(a.createdAt).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('modalContent').textContent=a.content;
  const c=document.getElementById('modalCover');
  if(a.coverImage){c.src=a.coverImage;c.style.display='block';}else{c.style.display='none';}
  document.getElementById('readModal').classList.add('open');
}
 
function closeModal(){document.getElementById('readModal').classList.remove('open');}
document.getElementById('readModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
 
function editArticle(id){
  const a=allArticles.find(x=>x._id===id);if(!a)return;
  document.getElementById('titleInput').value=a.title;
  document.getElementById('contentInput').value=a.content;
  document.getElementById('categoryInput').value=a.category;
  document.getElementById('editingId').value=a._id;
  document.getElementById('editorLabel').textContent='✦ Editing Article';
  document.getElementById('titleCount').textContent=a.title.length;
  document.getElementById('wordCount').textContent=a.content.trim().split(/\s+/).length;
  if(a.coverImage){document.getElementById('coverPreview').src=a.coverImage;document.getElementById('coverPreview').style.display='block';document.getElementById('coverContent').style.display='none';}
  window.scrollTo({top:0,behavior:'smooth'});
}
 
async function deleteArticle(id){
  if(!confirm('Delete this article?'))return;
  try{
    await ArticlesAPI.delete(id);
    showToast('Article deleted','error');
    await loadArticles();
  }catch(err){showToast('Error: '+err.message,'error');}
}
 
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent='✦ '+msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3500);
}
 
// Load on start
loadArticles();
</script>
</body>
</html>
